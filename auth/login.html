<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Expense Tracker</title>
    <link rel="icon" href="../assets/logo.png" type="image/png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/auth.css">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="auth-container fade-in">
        <div class="auth-card slide-up">
            <div class="brand-logo">
                <i class="fa-solid fa-wallet"></i>
            </div>
            <h1>Welcome Back</h1>
            <p class="subtitle">Please enter your details to sign in.</p>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email" class="floating-label">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="email" required placeholder="john@example.com">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password" class="floating-label">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" required placeholder="••••••••">
                        <button type="button" class="toggle-password"><i class="fa-regular fa-eye"></i></button>
                    </div>
                </div>

                <div class="form-actions">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="#" class="forgot-pass">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Sign Up</a></p>

                <div class="divider">
                    <span>Or continue with</span>
                </div>

                <div class="social-login">
                    <button class="social-btn"><i class="fa-brands fa-google"></i></button>
                    <button class="social-btn"><i class="fa-brands fa-apple"></i></button>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/auth.js"></script>
</body>

</html>
